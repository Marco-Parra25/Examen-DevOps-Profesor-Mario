name: CI/CD Tienda Perritos - Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - "k8s/backend-deployment.yaml"
      - "k8s/tienda-secrets.yaml" # Se dispara también si actualizas las configuraciones

jobs:
  build-push-deploy-backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar credenciales AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login en Amazon ECR (runner)
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build imagen Backend y push a ECR
      run: |
        cd backend
        docker build -t tienda-backend .
        docker tag tienda-backend:latest ${{ secrets.ECR_REPO_URL_BACKEND }}:latest
        docker push ${{ secrets.ECR_REPO_URL_BACKEND }}:latest

    - name: Configurar Kubeconfig para EKS
      run: |
        aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

    - name: Desplegar en EKS
      run: |
        # 1. Aplicamos primero los secrets por seguridad
        kubectl apply -f k8s/tienda-secrets.yaml
        # 2. Aplicamos el deployment actualizado con Probes y Secrets
        kubectl apply -f k8s/backend-deployment.yaml
        # 3. Forzamos el reinicio ordenado para asegurar que tome los últimos cambios e imágenes
        kubectl rollout restart deployment/backend-deployment
