# Configuración del cluster EKS (AWS Academy Learner Lab).
# Reutiliza el rol LabRole (Learner Lab no permite crear roles IAM).
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: tienda-cluster
  region: us-east-1

iam:
  serviceRoleARN: arn:aws:iam::081611519281:role/LabRole
  withOIDC: false

managedNodeGroups:
  - name: ng-tienda
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 4
    volumeSize: 20
    iam:
      instanceRoleARN: arn:aws:iam::081611519281:role/LabRole
