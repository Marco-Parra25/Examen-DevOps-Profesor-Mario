apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        # Reemplazar con la URL real de tu repositorio ECR, por ejemplo:
        # 123456789012.dkr.ecr.us-east-1.amazonaws.com/tienda-backend:latest
        image: backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DB_HOST
          value: "db-service" # Cambiar por la IP/DNS de tu DB (ej. "db-service" si corre en k8s, o IP privada si es EC2/RDS)
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "admin123"
        - name: DB_NAME
          value: "tienda_perritos"
        - name: DB_PORT
          value: "3306"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
  - name: http
    port: 8080
    targetPort: 3001
